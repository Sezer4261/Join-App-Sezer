<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Board</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="./styles/sidebar.css">
  <link rel="stylesheet" href="./styles/header.css">
  <script src="board.js" defer></script>
  <script src="./scripts/sidebar.js" defer></script>
</head>
<body onload="loadTasks()">
  <nav class="sidebar">
    <img class="logo_sidebar" src="./assets/img/join_logo_white.svg" alt="Join Logo">
    <ul>
      <li id="summary-li" class="sidebar-li-hover-effect">
        <div>
          <img src="./assets/icons/vector_summ.svg" alt="Summary-Icon">
          <a href="summary.html">Summary</a>
        </div>
      </li>
      <li id="add-task-li" class="sidebar-li-hover-effect">
        <div>
          <img src="./assets/icons/edit_square.svg" alt="Edit-Square-Icon">
          <a href="addTask.html">Add Task</a>
        </div>
      </li>
      <li id="board-li" class="highlighted">
        <div>
          <img src="./assets/icons/vector_board.svg" alt="Board-Icon">
          <a href="board.html">Board</a>
        </div>
      </li>
      <li id="contacts-li" class="sidebar-li-hover-effect">
        <div>
          <img src="./assets/icons/perm_contact_calendar.svg" alt="Contact-Icon">
          <a href="contacts.html">Contacts</a>
        </div>
      </li>
    </ul>
    <footer class="sidebar-footer">
      <div id="privacy-policy-div" class="footer-link-container">
        <a href="./privacy-policy.html" class="sidebar-footer-link-hover-effect">Privacy Policy</a>
      </div>
      <div id="legal-notice-div" class="footer-link-container">
        <a href="./legal-notice.html" class="sidebar-footer-link-hover-effect">Legal notice</a>
      </div>
    </footer>
  </nav>

  <header>
    <div class="center">
      <p class="app-tagline">Kanban Project Management Tool</p>
    </div>
    <div class="user-actions">
      <img class="help-icon" src="./assets/icons/help.svg" alt="Help" onclick="navigateToHelp()">
      <div class="user-profile-container">
        <span class="user-profile" id="user-profile">G</span>
      </div>
    </div>
  </header>

  <main class="board">
    <div class="board-column" id="todo" ondrop="drop(event, 'Todo')" ondragover="allowDrop(event)">
      <h3>To do</h3>
    </div>
    <div class="board-column" id="in-progress" ondrop="drop(event, 'In Progress')" ondragover="allowDrop(event)">
      <h3>In Progress</h3>
    </div>
    <div class="board-column" id="feedback" ondrop="drop(event, 'Feedback')" ondragover="allowDrop(event)">
      <h3>Await Feedback</h3>
    </div>
    <div class="board-column" id="done" ondrop="drop(event, 'Done')" ondragover="allowDrop(event)">
      <h3>Done</h3>
    </div>
  </main>

  <div id="overlay" class="overlay"></div>
</body>
</html>
