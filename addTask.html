<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Task</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="./styles/sidebar.css">
  <link rel="stylesheet" href="./styles/header.css">

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
  <script src="./scripts/sidebar.js" defer></script>
  <script src="add-task.js" defer></script>
</head>
<body>
  <nav class="sidebar">
    <img class="logo_sidebar" src="./assets/img/join_logo_white.svg" alt="Join Logo">
    <ul>
      <li id="summary-li">
        <div>
          <img src="./assets/icons/vector_summ.svg" alt="Summary">
          <a href="summary.html">Summary</a>
        </div>
      </li>
      <li id="add-task-li" class="highlighted">
        <div>
          <img src="./assets/icons/edit_square.svg" alt="Add Task">
          <a href="addTask.html">Add Task</a>
        </div>
      </li>
      <li id="board-li">
        <div>
          <img src="./assets/icons/vector_board.svg" alt="Board">
          <a href="board.html">Board</a>
        </div>
      </li>
      <li id="contacts-li">
        <div>
          <img src="./assets/icons/perm_contact_calendar.svg" alt="Contacts">
          <a href="contacts.html">Contacts</a>
        </div>
      </li>
    </ul>
    <footer class="sidebar-footer">
      <div><a href="privacy-policy.html">Privacy Policy</a></div>
      <div><a href="legal-notice.html">Legal Notice</a></div>
    </footer>
  </nav>

  <header>
    <div class="center">
      <p class="app-tagline">Kanban Project Management Tool</p>
    </div>
    <div class="user-actions">
      <img class="help-icon" src="./assets/icons/help.svg" alt="Help" onclick="navigateToHelp()">
      <div class="user-profile-container"><span class="user-profile" id="user-profile">G</span></div>
    </div>
  </header>

  <main>
    <h1>Add Task</h1>
    <form id="add-task-form" class="task-form">
      <label for="task-title">Title</label>
      <input type="text" id="task-title" required>

      <label for="task-desc">Description</label>
      <textarea id="task-desc" rows="4" required></textarea>

      <label for="task-category">Category</label>
      <select id="task-category" required>
        <option value="">Select</option>
        <option value="Technical Task">Technical Task</option>
        <option value="User Story">User Story</option>
      </select>

      <label>Priority</label>
      <div class="priority-group">
        <label><input type="radio" name="priority" value="low"> Low</label>
        <label><input type="radio" name="priority" value="medium" checked> Medium</label>
        <label><input type="radio" name="priority" value="urgent"> Urgent</label>
      </div>

      <label for="task-date">Due Date</label>
      <input type="date" id="task-date" required>

      <label for="subtask-input">Subtasks</label>
      <div class="subtask-input-group">
        <input type="text" id="subtask-input" placeholder="Add subtask">
        <button type="button" id="add-subtask-btn">+</button>
      </div>
      <ul id="subtask-list"></ul>

      <button type="submit" class="submit-btn">Create Task</button>
    </form>
  </main>
</body>
</html>
