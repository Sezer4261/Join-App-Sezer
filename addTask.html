<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Join – Add Task</title>
  <link rel="stylesheet" href="./styles/addTask.css">
  <link rel="stylesheet" href="./styles/sidebar.css">
  <link rel="stylesheet" href="./styles/header.css">


  <script src="./scripts/sidebar.js"></script>
  <script src="./script.js"></script>
  <script src="./scripts/add-task.js"></script>
</head>

<body>
  <div class="app">
    <!-- Sidebar -->
    <nav class="sidebar">
      <img class="logo_sidebar" src="./assets/img/join_logo_white.svg" alt="Join Logo">

      <ul>
        <li onclick="sidebarHighlightingSummary()" class="sidebar-li-hover-effect" id="summary-li">
          <div>
            <img src="./assets/icons/vector_summ.svg" alt="Summary-Icon">
            <a href="summary.html" aria-current="page">Summary</a>
          </div>
        </li>
        <li onclick="sidebarHighlightingAddTask()" class="highlighted" id="add-task-li">
          <div>
            <img src="./assets/icons/edit_square.svg" alt=" Edit-Square-Icon">
            <a href="addTask.html">Add Task</a>
          </div>
        </li>
        <li onclick="sidebarHighlightingBoard()" class="sidebar-li-hover-effect" id="board-li">
          <div>
            <img src="./assets/icons/vector_board.svg" alt="Board-Icon">
            <a href="board.html">Board</a>
          </div>
        </li>
        <li onclick="sidebarHighlightingContacts()" class="sidebar-li-hover-effect" id="contacts-li">
          <div>
            <img src="./assets/icons/perm_contact_calendar.svg" alt="Contact-Calendar-Icon">
            <a href="contacts.html">Contacts</a>
          </div>
        </li>
      </ul>


      <footer class="sidebar-footer">
        <div onclick="sidebarHighlightingPrivacyPolicy()" class="footer-link-container" id="privacy-policy-div">
          <a href="./privacy-policy.html" class="sidebar-footer-link-hover-effect">Privacy Policy</a>
        </div>
        <div onclick="sidebarHighlightingLegalNotice()" class="footer-link-container" id="legal-notice-div">
          <a href="./legal-notice.html" class="sidebar-footer-link-hover-effect">Legal notice</a>
        </div>
      </footer>
    </nav>

    <!-- Main -->
    <main class="main">
      <header>
        <div class="center">
          <p class="app-tagline">Kanban Project Management Tool</p>
        </div>

        <div class="user-actions">
          <img class="help-icon" src="./assets/icons/help.svg" alt="Help" onclick="navigateToHelp()">
          <div class="user-profile-container"><span class="user-profile" id="user-profile">G</span></div>
        </div>
      </header>

      <section class="content">
        <h1>Add Task</h1>

        <form class="task-form">
          <!-- Left side -->
          <div class="form-left">
            <label>
              <span>
                Title<span class="req">*</span>
              </span>
              <input type="text" placeholder="Enter a title">
            </label>

            <label>
              Description
              <textarea placeholder="Enter a Description"></textarea>
            </label>

            <label>
              <span>
                Due date<span class="req">*</span>
              </span>
              <input type="date">
            </label>
          </div>

          <!-- Right side -->
          <div class="form-right">
            <div class="priority">
              <span>Priority</span>
              <div class="priority-options">
                <input type="radio" id="urgent" name="priority" value="urgent">
                <label for="urgent" class="urgent">Urgent <img src="./assets/img/Category_Urgent.svg"
                    alt="Kategorie Urgent" class="icon"></label>

                <input type="radio" id="medium" name="priority" value="medium" checked>
                <label for="medium" class="medium">Medium <img src="./assets/img/Category_Medium.svg"
                    alt="Kategorie Medium" class="icon"></label>

                <input type="radio" id="low" name="priority" value="low">
                <label for="low" class="low">Low <img src="./assets/img/Category_Low.svg" alt="Kategorie Low"
                    class="icon"></label>
              </div>
            </div>



            <label>
              Assigned to
              <select>
                <option>Select contacts to assign</option>
              </select>
            </label>

            <label>
              <span>
                Category<span class="req">*</span>
              </span>
              <select>
                <option>Select task category</option>
                <option value="Technical Task">Technical task</option>
                <option value="User Story">User Story</option>
              </select>
            </label>

            <label>
              Subtasks
              <div class="subtasks">
                <input type="text" placeholder="Add new subtask">
                <button type="button" class="plus">+</button>
              </div>
            </label>

            <div class="actions">
              <button type="reset" class="clear">Clear ✕</button>
              <button type="submit" class="create">Create Task ▾</button>
            </div>
          </div>
        </form>

        <p class="note"><span class="req">*</span>This field is required</p>

      </section>
    </main>
  </div>
</body>

</html>
